name: CI/CD Pipeline Cadrius Front-end

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy do React para a Locaweb
    runs-on: ubuntu-latest

    steps:
      - name: Executando Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LOCAWEB_HOST }}
          username: ${{ secrets.LOCAWEB_USER }}
          key: ${{ secrets.LOCAWEB_SSH_KEY }}
          script: |
            cd /opt/cadrius/Cadrius---Front-end
            git stash
            git pull origin main
            echo "Gerando variáveis de Produção..."
            echo "VITE_API_URL=https://api.cadrius.ia.br/api/v1/" > .env
            cd /opt/cadrius
            sudo docker compose up -d --build frontend
